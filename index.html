<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriDetector | Healthcare Login</title>
    <meta name="description" content="NutriDetector Healthcare Portal Login">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-decor"></div>
    <main class="page-container">
        
        <div class="auth-card">
            <header class="card-header">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4M10 10h4" />
                    </svg>
                    <h1>NutriDetector</h1>
                </div>
                <p class="subtitle">Your AI-Powered Healthcare Partner</p>
            </header>

            <div class="tabs">
                <div class="tab-indicator" id="tabIndicator"></div>
                <button class="tab-btn active" id="tabSignIn">Sign In</button>
                <button class="tab-btn" id="tabSignUp">Sign Up</button>
            </div>

            <div class="forms-container">
                <!-- SIGN IN FORM -->
                <form id="signInForm" class="form-pane active">
                    <div class="input-group">
                        <label for="si-mobile">Mobile Number</label>
                        <input type="tel" id="si-mobile" name="mobile" placeholder="Enter 10-digit number" required>
                        <span class="error-msg" id="si-mobile-err"></span>
                    </div>

                    <div class="input-group">
                        <label for="si-password">Password</label>
                        <input type="password" id="si-password" name="password" placeholder="Enter password" required>
                        <span class="error-msg" id="si-password-err"></span>
                    </div>

                    <button type="submit" class="submit-btn">Login</button>

                    <div class="switch-prompt">
                        Don't have an account? <a href="#" id="linkToSignUp">Sign Up</a>
                    </div>
                </form>

                <!-- SIGN UP FORM -->
                <form id="signUpForm" class="form-pane">
                    <div class="input-group">
                        <label for="su-name">Full Name</label>
                        <input type="text" id="su-name" name="name" placeholder="John Doe" required>
                    </div>

                    <div class="row">
                        <div class="input-group half">
                            <label for="su-age">Age</label>
                            <input type="number" id="su-age" name="age" placeholder="Age" min="0" max="150" required>
                        </div>
                        <div class="input-group half">
                            <label for="su-gender">Gender</label>
                            <select id="su-gender" name="gender" required>
                                <option value="" disabled selected>Select</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="su-mobile">Mobile Number</label>
                        <input type="tel" id="su-mobile" name="mobile" placeholder="10-digit number" required>
                        <span class="error-msg" id="su-mobile-err"></span>
                    </div>

                    <div class="input-group">
                        <label for="su-password">Password</label>
                        <input type="password" id="su-password" name="password" placeholder="Min 6 characters" required>
                        <span class="error-msg" id="su-password-err"></span>
                    </div>

                    <div class="input-group">
                        <label for="su-confirm-password">Confirm Password</label>
                        <input type="password" id="su-confirm-password" name="confirmPassword" placeholder="Repeat password" required>
                        <span class="error-msg" id="su-confirm-err"></span>
                    </div>

                    <button type="submit" class="submit-btn" id="registerBtn">Register</button>

                    <div class="switch-prompt">
                        Already have an account? <a href="#" id="linkToSignIn">Sign In</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
